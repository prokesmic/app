# Fly.io config — a single always-on worker machine (no public HTTP service).
# Deployed via the .github/workflows/fly-deploy.yml pipeline (no local CLI needed).
app = "canyon-monitor-prokesmic"
primary_region = "fra"            # Frankfurt — close to canyon.com (en-de)

[build]
  dockerfile = "Dockerfile"

# All config (watch targets, ntfy topic, 3-min loop) is baked into the image.
# Add a volume later for state persistence:  flyctl volumes create canyon_state

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
