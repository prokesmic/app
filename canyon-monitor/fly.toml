# Fly.io config — a single always-on worker machine (no HTTP service).
# Setup:
#   fly launch --no-deploy            (from the canyon-monitor/ dir; accept this file)
#   fly volume create canyon_state --size 1
#   fly secrets set TELEGRAM_BOT_TOKEN=... TELEGRAM_CHAT_ID=...
#   fly deploy
app = "canyon-outlet-monitor"
primary_region = "fra"            # Frankfurt — close to canyon.com (en-de)

[build]
  dockerfile = "Dockerfile"

[mounts]
  source = "canyon_state"
  destination = "/data"

[env]
  CANYON_LOCALE = "en-de"
  CANYON_CATEGORY = "gravel-bikes"
  CANYON_SIZES = "L,XS"
  CANYON_AVAILABLE_STATES = "InStock,PreOrder"
  INTERVAL_SECONDS = "180"
  LOOP = "1"
  STATE_FILE = "/data/canyon-state.json"

# Keep exactly one machine running 24/7; never auto-stop.
[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[deploy]
  min_machines_running = 1
