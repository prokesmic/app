name: AI Digest (manual / heuristic-only)

# NOTE: The primary twice-daily agent now runs LOCALLY on the Mac Mini via launchd
# (see ai-digest/deploy/) so it can use Gemma through Ollama. GitHub's cloud runners
# can't reach your local Ollama, so this workflow ranks with the HEURISTIC fallback
# only. It's kept as an optional manual run (e.g. when the Mac is off). Don't run it
# on a schedule alongside the local agent — their dedup state lives in different
# places (git vs. the Mac), so both running would double-deliver.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Collect + rank but do not save to Readwise"
        type: boolean
        default: false
      refresh_profile:
        description: "Rebuild the taste profile before ranking"
        type: boolean
        default: false

# Needed so the workflow can commit updated state/ back to the branch.
permissions:
  contents: write

concurrency:
  group: ai-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-digest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ai-digest/package-lock.json

      - run: npm ci

      - name: Run digest
        env:
          READWISE_TOKEN: ${{ secrets.READWISE_TOKEN }}
          DIGEST_LIMIT: ${{ vars.DIGEST_LIMIT || '20' }}
          READWISE_LOCATION: ${{ vars.READWISE_LOCATION || 'feed' }}
          READWISE_TAGS: ${{ vars.READWISE_TAGS || 'ai-digest' }}
          READWISE_FEEDBACK: ${{ vars.READWISE_FEEDBACK || '1' }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARGS="digest"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ "${{ github.event.inputs.refresh_profile }}" = "true" ]; then ARGS="$ARGS --refresh-profile"; fi
          npx tsx src/cli.ts $ARGS

      - name: Commit updated state
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/seen.json state/taste-profile.json state/transcribed.json
          if git diff --staged --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "chore(ai-digest): update state [skip ci]"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
