name: AI Digest

# Runs twice daily. Each run picks DIGEST_LIMIT fresh items (deduped against
# state/seen.json) and saves them to Readwise Reader, so the two runs together
# deliver ~2x DIGEST_LIMIT per day with no repeats.
#
# Times are UTC — adjust to taste. Default: ~07:00 and ~17:00 UTC.
on:
  schedule:
    - cron: "0 7 * * *"
    - cron: "0 17 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Collect + rank but do not save to Readwise"
        type: boolean
        default: false
      refresh_profile:
        description: "Rebuild the taste profile before ranking"
        type: boolean
        default: false

# Needed so the workflow can commit updated state/ back to the branch.
permissions:
  contents: write

concurrency:
  group: ai-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-digest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ai-digest/package-lock.json

      - run: npm ci

      - name: Run digest
        env:
          READWISE_TOKEN: ${{ secrets.READWISE_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DIGEST_MODEL: ${{ vars.DIGEST_MODEL || 'claude-opus-4-7' }}
          DIGEST_LIMIT: ${{ vars.DIGEST_LIMIT || '10' }}
          READWISE_LOCATION: ${{ vars.READWISE_LOCATION || 'feed' }}
          READWISE_TAGS: ${{ vars.READWISE_TAGS || 'ai-digest' }}
        run: |
          ARGS="digest"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ "${{ github.event.inputs.refresh_profile }}" = "true" ]; then ARGS="$ARGS --refresh-profile"; fi
          npx tsx src/cli.ts $ARGS

      - name: Commit updated state
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/seen.json state/taste-profile.json
          if git diff --staged --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "chore(ai-digest): update state [skip ci]"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
