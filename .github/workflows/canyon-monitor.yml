name: canyon-monitor

# Runs the Canyon outlet monitor on GitHub's servers — no machine of your own.
# Public repo => Actions minutes are free and unlimited.
#
# GitHub heavily throttles scheduled workflows (often only every 1-2h on quiet
# repos), so instead of one quick scan per trigger, each run LOOPS — scanning
# every 3 minutes for ~50 minutes, then exits cleanly (persisting state). With
# the concurrency guard, a queued scheduled run starts right after the previous
# one ends, giving near-continuous ~3-min coverage. (For a hard guarantee with
# zero gaps, run the always-on worker — see README.)

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}   # lets you (or me) trigger a run on demand
  push:                   # also run on any push to main (the workflow lives here)
    branches: [main]
    paths:
      - "canyon-monitor/**"
      - ".github/workflows/canyon-monitor.yml"

# Never run two scans at once; queue instead of overlapping.
concurrency:
  group: canyon-monitor
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 58   # safety net above MAX_RUNTIME_SECONDS
    steps:
      - name: Checkout monitor code
        uses: actions/checkout@v4

      # Persist "last seen" state between runs via the Actions cache.
      # Unique key per run + prefix restore-key = always load the latest entry.
      - name: Restore state
        uses: actions/cache/restore@v4
        with:
          path: state.json
          key: canyon-state-${{ github.run_id }}
          restore-keys: |
            canyon-state-

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Scan Canyon outlet
        env:
          STATE_FILE: state.json
          LOOP: "1"                    # scan repeatedly within the run
          INTERVAL_SECONDS: "180"      # every 3 minutes
          MAX_RUNTIME_SECONDS: "3000"  # for ~50 min, then exit cleanly
          # --- what to watch (your request) ---
          CANYON_LOCALE: en-de
          CANYON_CATEGORY: gravel-bikes
          CANYON_SIZES: L,XS
          CANYON_AVAILABLE_STATES: InStock,PreOrder
          # --- notifications ---
          # ntfy works with no secrets: just subscribe to this topic in the app.
          NTFY_TOPIC: canyon-725492658e89b57c
          NTFY_SERVER: https://ntfy.sh
          # Telegram lights up automatically once you add these repo secrets.
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node canyon-monitor/monitor.mjs

      - name: Save state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state.json
          key: canyon-state-${{ github.run_id }}
